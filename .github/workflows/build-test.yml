name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'
      - run: yarn install
      - run: yarn build
      - run: yarn test
        env:
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
